<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>OngoingAI — Stay in the vibe</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<script src="https://unpkg.com/lucide@latest"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="Nav.jsx"></script>
<script type="text/babel" src="Hero.jsx"></script>
<script type="text/babel" src="Logos.jsx"></script>
<script type="text/babel" src="CodeDemo.jsx"></script>
<script type="text/babel" src="Features.jsx"></script>
<script type="text/babel" src="Testimonial.jsx"></script>
<script type="text/babel" src="Pricing.jsx"></script>
<script type="text/babel" src="CTA.jsx"></script>
<script type="text/babel" src="Footer.jsx"></script>

<script type="text/babel">
function App() {
  const [installed, setInstalled] = React.useState(false);
  React.useEffect(() => {
    // Redraw lucide icons after each render cycle
    const t = setTimeout(() => window.lucide && window.lucide.createIcons(), 30);
    return () => clearTimeout(t);
  });
  return (
    <div data-screen-label="01 Landing">
      <Nav onCta={() => setInstalled(true)} />
      <Hero />
      <LogoRow />
      <CodeDemo />
      <Features />
      <Testimonial />
      <Pricing />
      <CTABanner />
      <Footer />
      {installed && (
        <div onClick={() => setInstalled(false)} style={{position:'fixed',inset:0,background:'rgba(14,13,11,.4)',zIndex:50,display:'flex',alignItems:'center',justifyContent:'center',padding:32}}>
          <div onClick={e=>e.stopPropagation()} style={{background:'var(--bg-elevated)',border:'1px solid var(--ink-900)',borderRadius:14,padding:32,maxWidth:480,width:'100%',boxShadow:'var(--shadow-lg)'}}>
            <span style={{fontFamily:'var(--font-mono)',fontSize:11,letterSpacing:'.12em',textTransform:'uppercase',color:'var(--orange-500)'}}>Install</span>
            <h3 style={{fontFamily:'var(--font-display)',fontSize:32,margin:'8px 0 16px',letterSpacing:'-.02em'}}>One line. Thirty seconds.</h3>
            <pre style={{background:'var(--ink-900)',color:'var(--ink-50)',padding:16,borderRadius:10,fontFamily:'var(--font-mono)',fontSize:13,margin:0,overflow:'auto'}}>curl -fsSL ongoing.ai/i | sh</pre>
            <button onClick={()=>setInstalled(false)} style={{marginTop:20,background:'var(--orange-400)',color:'var(--fg-on-accent)',border:'1px solid var(--ink-900)',padding:'10px 18px',borderRadius:10,fontFamily:'var(--font-sans)',fontSize:14,fontWeight:600,cursor:'pointer'}}>Got it →</button>
          </div>
        </div>
      )}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
