<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--bg);overflow:hidden}
  .wrap{padding:22px 28px;height:100vh;box-sizing:border-box;display:grid;grid-template-columns:1fr 1fr;gap:14px;align-items:center}
  .copy{padding:16px 18px;border-radius:12px;border:1px solid var(--border-1);background:var(--bg-elevated)}
  .good{border-left:3px solid var(--success)}
  .bad{border-left:3px solid var(--danger)}
  .tag{font:500 10px var(--font-mono);letter-spacing:.08em;text-transform:uppercase;display:block;margin-bottom:6px}
  .good .tag{color:var(--success)}
  .bad .tag{color:var(--danger)}
  .line{font:400 14px var(--font-sans);color:var(--fg-1);line-height:1.45}
  .bad .line{color:var(--fg-3)}
</style></head><body>
<div class="wrap">
  <div class="copy good"><span class="tag">Do</span><span class="line">Stay in the vibe. Keep the rails on.</span></div>
  <div class="copy bad"><span class="tag">Don't</span><span class="line">🚀 Unleash your coding potential with our revolutionary AI platform!</span></div>
</div>
</body></html>
