<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>

<div class="wrap">
  <img src="../assets/logo-mark.png" alt="OngoingAI logomark">
  <div class="side"><span class="s">Logomark · primary lockup</span><span class="t">OngoingAI</span><span class="s">On brand orange · #FD953B</span></div>
