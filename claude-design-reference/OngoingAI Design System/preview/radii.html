<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--bg);overflow:hidden}
  .card{padding:22px 28px;height:100vh;box-sizing:border-box;display:flex;align-items:center;gap:22px}
  .sw{display:flex;flex-direction:column;align-items:center;gap:8px}
  .box{width:72px;height:56px;background:var(--orange-400);border:1px solid var(--ink-900)}
  .lbl{font:500 10px var(--font-mono);color:var(--fg-3)}
</style></head><body>
<div class="card">
  <div class="sw"><div class="box" style="border-radius:4px"></div><span class="lbl">xs · 4</span></div>
  <div class="sw"><div class="box" style="border-radius:6px"></div><span class="lbl">sm · 6</span></div>
  <div class="sw"><div class="box" style="border-radius:10px"></div><span class="lbl">md · 10</span></div>
  <div class="sw"><div class="box" style="border-radius:14px"></div><span class="lbl">lg · 14</span></div>
  <div class="sw"><div class="box" style="border-radius:20px"></div><span class="lbl">xl · 20</span></div>
  <div class="sw"><div class="box" style="border-radius:999px;width:90px"></div><span class="lbl">pill</span></div>
</div>
</body></html>
