<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--bg);overflow:hidden}
  .card{padding:24px 28px;height:100vh;box-sizing:border-box;display:flex;flex-direction:column;justify-content:center;gap:6px}
  .spec{font-family:var(--font-display);color:var(--fg-1);line-height:1}
  .meta{font:500 11px var(--font-mono);color:var(--fg-3);letter-spacing:.05em;text-transform:uppercase}
</style></head><body>
<div class="card">
  <span class="meta">Display — Instrument Serif</span>
  <div class="spec" style="font-size:68px;letter-spacing:-.03em">Stay in the <em style="font-style:italic">vibe</em>.</div>
</div>
</body></html>
