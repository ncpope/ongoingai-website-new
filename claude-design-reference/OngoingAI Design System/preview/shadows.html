<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--bg);overflow:hidden}
  .card{padding:28px;height:100vh;box-sizing:border-box;display:flex;align-items:center;gap:24px}
  .sw{display:flex;flex-direction:column;align-items:center;gap:10px}
  .box{width:110px;height:70px;background:var(--bg-elevated);border-radius:10px;border:1px solid var(--border-1)}
  .lbl{font:500 10px var(--font-mono);color:var(--fg-3)}
</style></head><body>
<div class="card">
  <div class="sw"><div class="box" style="box-shadow:var(--shadow-xs)"></div><span class="lbl">xs · resting</span></div>
  <div class="sw"><div class="box" style="box-shadow:var(--shadow-sm)"></div><span class="lbl">sm · cards</span></div>
  <div class="sw"><div class="box" style="box-shadow:var(--shadow-md)"></div><span class="lbl">md · hover</span></div>
  <div class="sw"><div class="box" style="box-shadow:var(--shadow-lg)"></div><span class="lbl">lg · modal</span></div>
  <div class="sw"><div class="box" style="box-shadow:var(--shadow-glow-orange);border-color:var(--orange-500)"></div><span class="lbl">focus ring</span></div>
</div>
</body></html>
