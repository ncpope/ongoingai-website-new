<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--bg);overflow:hidden}
  .card{padding:20px 24px;height:100vh;box-sizing:border-box;display:flex;align-items:center;gap:28px}
  .sw{display:flex;flex-direction:column;gap:8px;align-items:flex-start}
  .chip{width:120px;height:72px;border-radius:10px;color:#fff;display:flex;align-items:flex-end;padding:8px 10px;font:600 13px var(--font-sans)}
  .label{font:500 11px var(--font-mono);color:var(--fg-3);text-transform:uppercase;letter-spacing:.05em}
  .hex{font:500 11px var(--font-mono);color:var(--fg-3)}
</style></head><body>
<div class="card">
  <div class="sw"><span class="label">Success</span><div class="chip" style="background:var(--success)">Deploy ok</div><span class="hex">#2E7D4F</span></div>
  <div class="sw"><span class="label">Warning</span><div class="chip" style="background:var(--warning)">Heads up</div><span class="hex">#D98E00</span></div>
  <div class="sw"><span class="label">Danger</span><div class="chip" style="background:var(--danger)">Rollback</div><span class="hex">#C2410C</span></div>
  <div class="sw"><span class="label">Info</span><div class="chip" style="background:var(--info)">Note</div><span class="hex">#2563A8</span></div>
</div>
</body></html>
