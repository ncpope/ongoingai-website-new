<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--bg);overflow:hidden}
  .card{padding:22px 28px;height:100vh;box-sizing:border-box;display:flex;flex-direction:column;justify-content:center;gap:16px}
  pre{margin:0;padding:14px 16px;background:var(--ink-900);color:var(--ink-50);border-radius:10px;font:500 13px var(--font-mono);line-height:1.5;overflow:hidden}
  .eyebrow{font:500 11px var(--font-mono);letter-spacing:.12em;text-transform:uppercase;color:var(--orange-500)}
  .sample{font:500 11px var(--font-mono);color:var(--fg-3)}
</style></head><body>
<div class="card">
  <div class="eyebrow">Built for vibe coders · mono eyebrow</div>
  <pre>const keep <span style="color:var(--orange-300)">=</span> ongoing.<span style="color:var(--orange-300)">checkpoint</span>();
revert(keep); <span style="color:var(--ink-400)">// one-click rollback</span></pre>
  <span class="sample">Geist Mono · 13/20 · used for code, eyebrows, hex values</span>
</div>
</body></html>
