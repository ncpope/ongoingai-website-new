<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--bg);overflow:hidden}
  .card{padding:20px 24px;height:100vh;box-sizing:border-box;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  .sw{display:flex;flex-direction:column;gap:6px;align-items:flex-start}
  .chip{width:80px;height:60px;border-radius:10px;border:1px solid var(--border-1);display:flex;align-items:flex-end;padding:6px 8px;font:500 10px var(--font-mono)}
  .dark{color:#fff}
  .light{color:var(--fg-1)}
  .hex{font:500 10px var(--font-mono);color:var(--fg-3)}
</style></head><body>
<div class="card">
  <div class="sw"><div class="chip light" style="background:var(--ink-0);border:1px solid var(--border-1)">0</div><span class="hex">#FFFFFF</span></div>
  <div class="sw"><div class="chip light" style="background:var(--ink-50)">50 paper</div><span class="hex">#FAF8F5</span></div>
  <div class="sw"><div class="chip light" style="background:var(--ink-100)">100</div><span class="hex">#F2EFE9</span></div>
  <div class="sw"><div class="chip light" style="background:var(--ink-200)">200</div><span class="hex">#E6E2DA</span></div>
  <div class="sw"><div class="chip light" style="background:var(--ink-300)">300</div><span class="hex">#CBC6BC</span></div>
  <div class="sw"><div class="chip light" style="background:var(--ink-400)">400</div><span class="hex">#9D978C</span></div>
  <div class="sw"><div class="chip dark" style="background:var(--ink-500)">500</div><span class="hex">#6E6960</span></div>
  <div class="sw"><div class="chip dark" style="background:var(--ink-600)">600</div><span class="hex">#4A4640</span></div>
  <div class="sw"><div class="chip dark" style="background:var(--ink-700)">700</div><span class="hex">#2E2B27</span></div>
  <div class="sw"><div class="chip dark" style="background:var(--ink-800)">800</div><span class="hex">#1A1815</span></div>
  <div class="sw"><div class="chip dark" style="background:var(--ink-900)">900 ink</div><span class="hex">#0E0D0B</span></div>
</div>
</body></html>
