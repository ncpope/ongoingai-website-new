<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--bg);overflow:hidden}
  .card{padding:22px 28px;height:100vh;box-sizing:border-box;display:flex;align-items:flex-end;gap:10px}
  .col{display:flex;flex-direction:column;align-items:center;gap:6px}
  .box{background:var(--orange-400);width:auto;border-radius:3px}
  .lbl{font:500 10px var(--font-mono);color:var(--fg-3)}
</style></head><body>
<div class="card">
  <div class="col"><div class="box" style="width:4px;height:4px"></div><span class="lbl">s-1 · 4</span></div>
  <div class="col"><div class="box" style="width:8px;height:8px"></div><span class="lbl">s-2 · 8</span></div>
  <div class="col"><div class="box" style="width:12px;height:12px"></div><span class="lbl">s-3 · 12</span></div>
  <div class="col"><div class="box" style="width:16px;height:16px"></div><span class="lbl">s-4 · 16</span></div>
  <div class="col"><div class="box" style="width:24px;height:24px"></div><span class="lbl">s-5 · 24</span></div>
  <div class="col"><div class="box" style="width:32px;height:32px"></div><span class="lbl">s-6 · 32</span></div>
  <div class="col"><div class="box" style="width:48px;height:48px"></div><span class="lbl">s-7 · 48</span></div>
  <div class="col"><div class="box" style="width:64px;height:64px"></div><span class="lbl">s-8 · 64</span></div>
  <div class="col"><div class="box" style="width:96px;height:96px"></div><span class="lbl">s-9 · 96</span></div>
</div>
</body></html>
