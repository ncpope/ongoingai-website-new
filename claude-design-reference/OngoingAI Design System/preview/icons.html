<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<script src="https://unpkg.com/lucide@latest"></script>
<style>
  html,body{margin:0;padding:0;background:var(--bg);overflow:hidden}
  .card{padding:22px 28px;height:100vh;box-sizing:border-box;display:flex;align-items:center;gap:26px;flex-wrap:wrap}
  .ic{display:flex;flex-direction:column;align-items:center;gap:8px;color:var(--fg-1)}
  .ic i{width:28px;height:28px}
  .lbl{font:500 10px var(--font-mono);color:var(--fg-3)}
</style></head><body>
<div class="card">
  <div class="ic"><i data-lucide="terminal"></i><span class="lbl">terminal</span></div>
  <div class="ic"><i data-lucide="git-branch"></i><span class="lbl">git-branch</span></div>
  <div class="ic"><i data-lucide="sparkles"></i><span class="lbl">sparkles</span></div>
  <div class="ic"><i data-lucide="rotate-ccw"></i><span class="lbl">rotate-ccw</span></div>
  <div class="ic"><i data-lucide="check-circle-2"></i><span class="lbl">check</span></div>
  <div class="ic"><i data-lucide="alert-triangle"></i><span class="lbl">alert</span></div>
  <div class="ic"><i data-lucide="zap"></i><span class="lbl">zap</span></div>
  <div class="ic"><i data-lucide="book-open"></i><span class="lbl">book</span></div>
  <div class="ic"><i data-lucide="command"></i><span class="lbl">command</span></div>
</div>
<script>lucide.createIcons();</script>
</body></html>
